  build_mac_arm:
    runs-on: macos-15

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4.1.1
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5.0.0
      with:
        python-version: 3.11

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install py2app

    - name: Build Exec
      run: |
        pyside6-uic ./pkg/ui/main.ui -o ./pkg/ui/main_ui.py
        pyside6-uic ./pkg/ui/nm.ui   -o ./pkg/ui/nm_ui.py
        pyside6-lupdate ./pkg/ui/main.ui ./pkg/ui/nm.ui ./pkg/ui/about_ui.py ./pkg/ui/debug_ui.py ./pkg/ui/login_ui.py ./pkg/nm_window.py ./pkg/main_window.py ./pkg/ierWorker.py ./pkg/versionWorker.py ./pkg/api/devices.py ./pkg/api/device_flam.py ./pkg/api/device_lunii.py -ts ./locales/fr_FR.ts
        pyside6-lrelease ./locales/fr_FR.ts ./locales/fr_FR.qm  
        pyside6-rcc ./resources.qrc -o ./resources_rc.py
        python setup_macos.py py2app
        echo "SIZE POST-BUILD"
        du -sh dist

    - name: Create Portable Archive
      run: |
        cd dist
        zip -9 -r Lunii.Qt-${{ github.ref_name }}-MacOs-arm64.zip ./luniiQt.app

    - name: Upload Portable Artefact
      uses: actions/upload-artifact@v4.0.0
      with:
        name: Lunii.Qt-${{ github.ref_name }}-MacOs-arm64_Portable
        path: |
          ./dist/Lunii.Qt-${{ github.ref_name }}-MacOs-arm64.zip
 
    - name: Create DMG
      run: |
        brew install create-dmg
        create-dmg \
        --volname "LuniiQt Installer" \
        --volicon "res/Lunii.ico" \
        --window-pos 200 120 \
        --window-size 600 400 \
        --icon-size 100 \
        --icon "luniiQt.app" 100 200 \
        --app-drop-link 400 200 \
        "luniiQt.dmg" \
        "dist/"
        
    - name: Upload DMG Artefact
      uses: actions/upload-artifact@v4.0.0
      with:
        name: Lunii.Qt-${{ github.ref_name }}-MacOs-arm64_DMG
        path: |
          ./luniiQt.dmg

    - name: Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        draft: true
        files: Lunii.Qt-${{ github.ref_name }}-MacOs-arm64.zip

